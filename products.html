<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>选购你的时光数量</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="index.html">山野寻趣社</a>
        <nav class="nav">
            <a href="products.html" aria-current="page">挑选个数</a>
            <a class="cart-link" href="cart.html" aria-label="Shopping Cart">
                <span class="cart-icon">🛒</span>
                <span id="cart-count" class="cart-count">0</span>
            </a>
        </nav>
    </header>

    <main class="container" aria-label="Product Listing">
        <h1>专为山野打造</h1>

        <section class="category">
            <h2>早上的时光</h2>
            <div class="grid">
                <article class="card" data-id="snake" data-name="" data-price="14.99" data-img="images/Snake Plant.jpg">
                    <img alt="一个时光" src="images/2.jpg" style="width: 100%; max-width: 550px;">
                    <div class="card-body">
                        <h3>一个时光</h3>
                        <p class="price">$1</p>
                        <button class="btn add-to-cart" data-id="snake">Add to Cart</button>
                    </div>
                </article>
                <article class="card" data-id="zz" data-name="ZZ Plant" data-price="19.99" data-img="images/ZZ Plant.jpg">
                    <img alt="两个时光" src="images/2.jpg" style="width: 100%; max-width: 550px;"">
                    <div class="card-body">
                        <h3>两个时光</h3>
                        <p class="price">$2</p>
                        <button class="btn add-to-cart" data-id="zz">Add to Cart</button>
                    </div>
                </article>
            </div>
        </section>

        <section class="category">
            <h2>中午的时光</h2>
            <div class="grid">
                <article class="card" data-id="calathea" data-name="Calathea" data-price="16.50" data-img="images/Calathea.webp">
                    <img alt="三个时光" src="images/2.jpg" style="width: 100%; max-width: 550px;"">
                    <div class="card-body">
                        <h3>三个时光</h3>
                        <p class="price">$3</p>
                        <button class="btn add-to-cart" data-id="calathea">Add to Cart</button>
                    </div>
                </article>
                <article class="card" data-id="parlor" data-name="Parlor Palm" data-price="12.00" data-img="images/Parlor Palm.jpg">
                    <img alt="四个时光" src="images/2.jpg" style="width: 100%; max-width: 550px;"">
                    <div class="card-body">
                        <h3>四个时光</h3>
                        <p class="price">$4</p>
                        <button class="btn add-to-cart" data-id="parlor">Add to Cart</button>
                    </div>
                </article>
            </div>
        </section>

        <section class="category">
            <h2>晚上的时光</h2>
            <div class="grid">
                <article class="card" data-id="pothos" data-name="Golden Pothos" data-price="9.99" data-img="images/Golden Pothos.jpg">
                    <img alt="五个时光" src="images/2.jpg" style="width: 100%; max-width: 550px;"">
                    <div class="card-body">
                        <h3>五个时光</h3>
                        <p class="price">$5</p>
                        <button class="btn add-to-cart" data-id="pothos">Add to Cart</button>
                    </div>
                </article>
                <article class="card" data-id="succulent" data-name="Assorted Succulent" data-price="7.50" data-img="images/Assorted Succulent.avif">
                    <img alt="六个时光" src="images/2.jpg" style="width: 100%; max-width: 550px;"">
                    <div class="card-body">
                        <h3>六个时光</h3>
                        <p class="price">$5.5</p>
                        <button class="btn add-to-cart" data-id="succulent">Add to Cart</button>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <script src="js/store.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
